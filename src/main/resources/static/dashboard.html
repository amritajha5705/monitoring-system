<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Monitoring Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
        }

        button {
            padding: 8px 15px;
            margin: 5px;
            background: #444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        table {
            margin: 20px auto;
            width: 85%;
            border-collapse: collapse;
            background: #222;
        }

        th, td {
            padding: 10px;
            border: 1px solid #555;
        }

        th {
            background: #333;
        }

        .alertBox {
            width: 60%;
            margin: 10px auto;
            padding: 10px;
            border-radius: 6px;
            text-align: left;
        }

        #cpuAlert { border-left: 5px solid red; background: #2a1a1a; }
        #memoryAlert { border-left: 5px solid orange; background: #2a241a; }
        #diskAlert { border-left: 5px solid purple; background: #241a2a; }
    </style>
</head>

<body>

<h1>System Monitoring Dashboard</h1>

<div id="cpuAlert" class="alertBox"></div>
<div id="memoryAlert" class="alertBox"></div>
<div id="diskAlert" class="alertBox"></div>

<h2>Total Systems: <span id="totalCount">0</span></h2>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>System</th>
        <th>CPU</th>
        <th>Memory</th>
        <th>Disk</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<canvas id="cpuChart"></canvas>
<canvas id="memoryChart"></canvas>
<canvas id="diskChart"></canvas>

<script>
    document.addEventListener("DOMContentLoaded", function () {

        let cpuChart, memoryChart, diskChart;
        let systems = [];

        function loadData() {
            fetch("https://monitoring-system-4dii.onrender.com/api/metrics")
            .then(res => res.json())
            .then(data => {

                console.log("API DATA:", data);

                systems = data;

                const table = document.getElementById("tableBody");
                const cpuAlert = document.getElementById("cpuAlert");
                const memoryAlert = document.getElementById("memoryAlert");
                const diskAlert = document.getElementById("diskAlert");

                if (!table) return;

                table.innerHTML = "";
                cpuAlert.innerHTML = "";
                memoryAlert.innerHTML = "";
                diskAlert.innerHTML = "";

                document.getElementById("totalCount").innerText = data.length;

                let labels = [], cpu = [], mem = [], disk = [];

                data.forEach(item => {

                    // 🔥 FIX: handle ANY backend format
                    const id = item.id || item._id;
                    const name = item.systemName || item.system_name;
                    const cpuVal = item.cpuUsage ?? item.cpu;
                    const memVal = item.memoryUsage ?? item.memory;
                    const diskVal = item.diskUsage ?? item.disk;

                    if (cpuVal > 80) {
                        cpuAlert.innerHTML += `🔴 High CPU on ${name} (${cpuVal}%)<br>`;
                    }

                    if (memVal > 80) {
                        memoryAlert.innerHTML += `🟠 High Memory on ${name} (${memVal}%)<br>`;
                    }

                    if (diskVal > 80) {
                        diskAlert.innerHTML += `🟣 High Disk on ${name} (${diskVal}%)<br>`;
                    }

                    let highlight = (cpuVal > 80 || memVal > 80 || diskVal > 80)
                        ? "style='background:#ffcccc'" : "";

                    table.innerHTML += `
                        <tr ${highlight}>
                            <td>${id}</td>
                            <td>${name}</td>
                            <td>${cpuVal}</td>
                            <td>${memVal}</td>
                            <td>${diskVal}</td>
                            <td>
                                <button onclick="editSystem('${id}')">Edit</button>
                                <button onclick="deleteSystem('${id}')">Delete</button>
                            </td>
                        </tr>
                    `;

                    labels.push(name);
                    cpu.push(cpuVal);
                    mem.push(memVal);
                    disk.push(diskVal);
                });

                // Charts
                if (cpuChart) cpuChart.destroy();
                cpuChart = new Chart(document.getElementById("cpuChart"), {
                    type: "bar",
                    data: { labels, datasets: [{ label: "CPU", data: cpu }] },
                    options: { scales: { y: { min: 0, max: 100 } } }
                });

                if (memoryChart) memoryChart.destroy();
                memoryChart = new Chart(document.getElementById("memoryChart"), {
                    type: "bar",
                    data: { labels, datasets: [{ label: "Memory", data: mem }] },
                    options: { scales: { y: { min: 0, max: 100 } } }
                });

                if (diskChart) diskChart.destroy();
                diskChart = new Chart(document.getElementById("diskChart"), {
                    type: "bar",
                    data: { labels, datasets: [{ label: "Disk", data: disk }] },
                    options: { scales: { y: { min: 0, max: 100 } } }
                });

            })
            .catch(err => console.error("FETCH ERROR:", err));
        }

        // DELETE
        window.deleteSystem = async function(id) {
            await fetch(`https://monitoring-system-4dii.onrender.com/api/metrics/${id}`, {
                method: "DELETE"
            });
            loadData();
        };

        // EDIT
        window.editSystem = function(id) {
            const s = systems.find(x => (x.id || x._id) == id);
            if (!s) return;

            alert("Edit feature depends on your form page");
        };

        setInterval(loadData, 5000);
        loadData();

    });
</script>

</body>
</html>
